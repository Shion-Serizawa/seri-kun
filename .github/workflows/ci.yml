name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "mise.toml"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/web/**"
      - "mise.toml"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate content metadata
        run: pnpm gen:meta

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build
